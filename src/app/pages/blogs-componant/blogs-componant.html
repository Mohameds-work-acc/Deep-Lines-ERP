<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-2xl font-bold">Blogs</h2>
    <div class="flex items-center gap-2">
      <input type="text" placeholder="Search blogs..." class="px-3 py-2 rounded-lg border" (input)="onSearch($event)">
      <button (click)="showBlogForm()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Add Blog</button>
    </div>
  </div>

  <div *ngIf="loading" class="py-8 flex justify-center">
    <div class="loading-spinner"></div>
  </div>

  <div *ngIf="!loading">
    <div *ngIf="filteredBlogs.length === 0" class="py-8 text-center text-gray-600">No blogs found</div>

    <div *ngIf="filteredBlogs.length > 0" class="overflow-auto">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let b of filteredBlogs" class="bg-white rounded-2xl shadow-lg p-4 relative hover:shadow-xl transition">
          <div class="h-40 w-full rounded-md bg-gray-100 overflow-hidden mb-3 flex items-center justify-center">
            <img *ngIf="b.imageUrl" [src]="b.imageUrl" alt="{{b.title}}" class="object-cover h-full w-full" />
            <div *ngIf="!b.imageUrl" class="text-gray-400">No image</div>
          </div>

          <div class="flex items-start justify-between">
            <div>
              <h3 class="text-lg font-semibold text-gray-900">{{ b.title }}</h3>
              <p class="text-xs text-gray-500">{{ b.published_date | date:'mediumDate' }}</p>
            </div>
            <div class="flex items-center gap-2">
              <button (click)="showBlogForm(b)" title="Edit" class="p-2 rounded-full bg-yellow-100 text-yellow-700 hover:bg-yellow-200">
                <i class="fas fa-edit"></i>
              </button>
              <button (click)="confirmDelete(b.id)" title="Delete" class="p-2 rounded-full bg-rose-100 text-rose-700 hover:bg-rose-200">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>

          <p class="mt-3 text-sm text-gray-700">
            {{ b.content | slice:0:140 }} <span *ngIf="(b.content?.length || 0) > 140">...</span>
          </p>

          <div class="mt-4 flex items-center justify-between text-sm text-gray-500">
            <span>#{{ b.id }}</span>
            <span class="italic">by {{ b.author?.name || 'Unknown' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
