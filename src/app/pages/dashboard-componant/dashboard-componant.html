<!-- Main Dashboard Container -->
 <div class="h-dvh overflow-scroll"
 >
    <div class="p-6 space-y-6 h-max mb-52">
      <!-- Welcome Header with Date -->
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold bg-gradient-to-br from-[#1f2a3f] to-[#2c3b50] bg-clip-text text-transparent">
            Welcome back, {{currentFullName}} <span class="text-amber-200">👋</span>
          </h1>
          <p class="text-[#5c6f88] mt-1 flex items-center gap-2">
            <i class="far fa-calendar-alt text-indigo-400"></i>
            {{ currentDate | date:'EEEE, MMMM d, y' }}
          </p>
        </div>
      </div>

      <!-- KPI Cards Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

        <!-- Orders Card -->
        <div class="glass-card rounded-3xl p-5">
          <div class="flex items-center justify-between">
            <div class="w-10 h-10 rounded-xl bg-indigo-100/80 text-indigo-600 flex items-center justify-center">
              <i class="fas fa-shopping-cart"></i>
            </div>
            <span class="text-xs font-semibold bg-indigo-100/80 text-indigo-700 px-2 py-1 rounded-full">+5.2%</span>
          </div>
          <div class="mt-3">
            <p class="text-sm text-[#5c6f88]">Total Orders</p>
            <h3 class="text-2xl font-bold text-[#1f2a3f]">1,892</h3>
            <p class="text-xs text-indigo-600 mt-1 flex items-center gap-1">
              <i class="fas fa-arrow-up"></i> 124 new today
            </p>
          </div>
        </div>

        <!-- Employees Card -->
        <div class="glass-card rounded-3xl p-5">
          <div class="flex items-center justify-between">
            <div class="w-10 h-10 rounded-xl bg-amber-100/80 text-amber-600 flex items-center justify-center">
              <i class="fas fa-users"></i>
            </div>
            <span class="text-xs font-semibold bg-amber-100/80 text-amber-700 px-2 py-1 rounded-full">+3.1%</span>
          </div>
          <div class="mt-3">
            <p class="text-sm text-[#5c6f88]">Active Employees</p>
            <h3 class="text-2xl font-bold text-[#1f2a3f]">245</h3>
            <p class="text-xs text-amber-600 mt-1 flex items-center gap-1">
              <i class="fas fa-user-plus"></i> 8 new hires
            </p>
          </div>
        </div>

      </div>
    </div>
</div>
