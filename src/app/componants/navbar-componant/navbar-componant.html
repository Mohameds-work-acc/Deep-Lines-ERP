<!-- GLASS NAVBAR (matching sidebar theme) -->
    <nav class="navbar-glass mx-6 mt-5 px-6 py-3 rounded-[32px] flex items-center justify-between relative z-50">
      <!-- left side: page title + breadcrumb -->
      <div class="flex items-center gap-4 ">
        <div class="flex items-center gap-2 text-sm">
          
        </div>

      </div>

      <!-- right side: icons & user -->
      <div class="flex items-center gap-3">


        <!-- user avatar -->
                <div class="relative" >
          <!-- user button that toggles dropdown -->
          <div
            class="flex items-center gap-2 cursor-pointer bg-white/70 backdrop-blur-sm pl-2 pr-3 py-1 rounded-2xl border border-white/80 shadow-sm hover:bg-white/80 transition"
            (click)="toggleUserMenu()"
          >
            <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-300 text-white flex items-center justify-center shadow-md">
              <span class="text-xs font-bold">{{currentName?.charAt(0)?.toUpperCase()}}</span>
            </div>
            <span class="text-sm font-medium text-[#1f2a3f] hidden sm:inline">{{currentName}}</span>
            <i class="fas fa-chevron-down text-[10px] text-[#7c8ba5]" [ngClass]="{'rotate-180': isUserMenuOpen}"></i>
          </div>

          <!-- dropdown menu -->
          <div
            *ngIf="isUserMenuOpen"
            class="absolute right-0 mt-2 w-48 glass-dropdown rounded-2xl py-2 border border-white/50 shadow-xl z-50"
          >
            <!-- user info header -->
            <div class="px-4 py-2 border-b border-white/30">
              <p class="text-sm font-semibold text-[#1f2a3f]">{{currentName}}</p>
              <p class="text-xs text-[#5c6f88]">{{currentEmail}}</p>
            </div>

            <!-- menu items -->


            <a
              href="#"
              class="flex items-center gap-3 px-4 py-2.5 text-sm text-[#1f2a3f] hover:bg-white/70 transition"
              (click)="onLogout($event)"
            >
              <i class="fas fa-sign-out-alt w-4 text-rose-500"></i>
              <span>Logout</span>
            </a>

            <!-- optional divider -->
            <div class="border-t border-white/30 my-1"></div>

            <!-- profile link -->
            <a
              routerLink="auth/change_password"
              class="flex items-center gap-3 px-4 py-2.5 text-sm text-[#1f2a3f] hover:bg-white/70 transition"
              
            >
              <i class="fa-solid fa-key w-4 text-indigo-500"></i>
              <span>Change Password</span>
            </a>
          </div>
        </div>
      </div>
    </nav>
