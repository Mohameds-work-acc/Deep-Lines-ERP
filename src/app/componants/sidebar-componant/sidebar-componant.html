<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<aside
        [ngClass]="{'w-[88px] p-4': collapsed, 'w-[280px] p-6': !collapsed}"
        class="h-full sidebar-transition bg-white/60 backdrop-blur-xl backdrop-saturate-150 rounded-[36px] border border-white/50 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.15)] flex flex-col gap-4 relative overflow-visible flex-shrink-0"
      >
        <!-- toggle button -->
        <button
          (click)="toggleSidebar()"
          class="absolute -right-3 top-10 w-8 h-8 bg-white/80 backdrop-blur-sm rounded-full border border-white/70 shadow-md flex items-center justify-center text-indigo-700 hover:scale-105 transition z-30 cursor-pointer"
        >
          <i [ngClass]="collapsed ? 'fa-chevron-right' : 'fa-chevron-left'" class="fas text-sm"></i>
        </button>

        <!-- HEADER -->
        <div class="flex items-center gap-3 px-1">
          <img src="Deep-Lines-Logo.png" alt="Logo" class="size-16 rounded-lg">
          <div *ngIf="!collapsed" class="flex items-baseline transition-all duration-200">
            <span class="font-bold text-xl tracking-tight bg-gradient-to-br from-[#1f2a3f] to-[#2c3b50] bg-clip-text text-transparent whitespace-nowrap">
              ERP<span class="text-[#2c3b50]">deeplines</span>
            </span>
          </div>
        </div>

        <!-- SEARCH -->
        <div *ngIf="!collapsed" class="flex items-center gap-3 bg-white/70 rounded-3xl py-2.5 px-4 border border-white/90 shadow-sm backdrop-blur-sm group focus-within:ring-2 ring-indigo-200/70 transition-all duration-200">
          <i class="fas fa-search text-sm text-[#5b6f88] group-focus-within:text-indigo-600"></i>
          <input type="text" placeholder="Search modules..." class="w-full bg-transparent outline-none text-sm text-[#1f2a3f] placeholder-[#8a9bb5] font-medium">
        </div>

        <!-- PRIMARY NAV -->
        <nav class="flex flex-col gap-2 mt-1">
          <!-- Dashboard -->
          <a
            href="#"
            (click)="setActiveLink('dashboard')"
            [ngClass]="{'nav-active': activeLink === 'dashboard'}"
            class="nav-link flex items-center gap-4 px-4 py-3 rounded-2xl text-[#1f2a3f] font-medium transition-all duration-200 hover:bg-white/70 hover:shadow-sm active:scale-[0.98] group"
          >
            <span class="w-5 text-[#4b6589] group-hover:text-indigo-700 transition flex-shrink-0"><i class="fas fa-chart-pie"></i></span>
            <span *ngIf="!collapsed" class="nav-text text-sm whitespace-nowrap">Dashboard</span>
            <span *ngIf="!collapsed" class="nav-badge ml-auto bg-indigo-100 text-indigo-800 text-[10px] font-semibold px-2 py-0.5 rounded-full border border-white/60 whitespace-nowrap">live</span>
          </a>

          <!-- FINANCE SECTOR -->
          <div class="sector-group">
            <div
              (click)="toggleSector('finance')"
              class="sector-toggle flex items-center gap-4 px-4 py-3 rounded-2xl text-[#1f2a3f] font-medium cursor-pointer hover:bg-white/70 transition-all duration-200 group"
            >
              <span class="w-5 text-[#4b6589] group-hover:text-indigo-700 flex-shrink-0"><i class="fa-solid fa-coins"></i></span>
              <span *ngIf="!collapsed" class="nav-text text-sm whitespace-nowrap">Finance</span>
              <i *ngIf="!collapsed" class="sector-chevron fas fa-chevron-right text-xs ml-auto text-[#6a7f9b]" [ngClass]="{'open': openSectors.finance}"></i>
            </div>
            <div *ngIf="!collapsed" class="submenu-collapsible pl-12 pr-2 flex flex-col gap-1 mt-1" [ngClass]="{'open': openSectors.finance}">
              <a
                (click)="setActiveLink('finance-invoices')"
                [ngClass]="{'nav-active': activeLink === 'finance-invoices'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Invoices</a>
              <a
                (click)="setActiveLink('finance-payments')"
                [ngClass]="{'nav-active': activeLink === 'finance-payments'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Payments</a>
              <a
                (click)="setActiveLink('finance-reports')"
                [ngClass]="{'nav-active': activeLink === 'finance-reports'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Reports</a>
            </div>
          </div>

          <!-- HR SECTOR -->
          <div class="sector-group">
            <div
              (click)="toggleSector('hr')"
              class="sector-toggle flex items-center gap-4 px-4 py-3 rounded-2xl text-[#1f2a3f] font-medium cursor-pointer hover:bg-white/70 transition-all duration-200 group"
            >
              <span class="w-5 text-[#4b6589] group-hover:text-indigo-700 flex-shrink-0"><i class="fas fa-users"></i></span>
              <span *ngIf="!collapsed" class="nav-text text-sm whitespace-nowrap">Human resources</span>
              <span *ngIf="!collapsed" class="nav-badge ml-auto text-[10px] bg-amber-100/80 text-amber-800 px-2 py-0.5 rounded-full border border-white/50 whitespace-nowrap">2</span>
              <i *ngIf="!collapsed" class="sector-chevron fas fa-chevron-right text-xs ml-1 text-[#6a7f9b]" [ngClass]="{'open': openSectors.hr}"></i>
            </div>
            <div *ngIf="!collapsed" class="submenu-collapsible pl-12 pr-2 flex flex-col gap-1 mt-1" [ngClass]="{'open': openSectors.hr}">
              <a
                routerLink="employees"
                [ngClass]="{'nav-active': activeLink === 'employees'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Employees</a>
              <a
                (click)="setActiveLink('hr-payroll')"
                [ngClass]="{'nav-active': activeLink === 'hr-payroll'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Payroll</a>
              <a
                (click)="setActiveLink('hr-recruitment')"
                [ngClass]="{'nav-active': activeLink === 'hr-recruitment'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Recruitment</a>
              <a
                (click)="setActiveLink('hr-timeoff')"
                [ngClass]="{'nav-active': activeLink === 'hr-timeoff'}"
                class="sub-link block py-2 text-sm text-[#3e5470] hover:text-indigo-700 transition rounded-xl px-3 hover:bg-white/60 whitespace-nowrap"
              >— Time off</a>
            </div>
          </div>
        </nav>

        <!-- DIVIDER -->
        <div *ngIf="!collapsed" class="border-t border-white/40 my-1"></div>

        <!-- SECONDARY NAV -->
        <div class="flex flex-col gap-2">
        </div>

        <!-- USER CARD -->
        <div class="mt-auto pt-3 flex flex-col gap-4">
          <div class="flex items-center gap-3 bg-white/70 backdrop-blur-sm rounded-2xl p-2 border border-white/80 shadow-sm hover:bg-white/80 transition cursor-pointer">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-300 text-white flex items-center justify-center shadow-md flex-shrink-0">
              <span class="text-sm font-bold">{{currentName?.charAt(0)?.toUpperCase()}}</span>
            </div>
            <div *ngIf="!collapsed" class="flex-1 transition-all duration-200">
              <div class="text-sm font-semibold text-[#1f2a3f] whitespace-nowrap">{{currentName}}</div>
              <div class="text-[10px] text-[#5c6f88] flex items-center gap-1 whitespace-nowrap">
                <i class="fas fa-circle text-[8px] text-emerald-500"></i> {{currentJobTitle}}
              </div>
            </div>
          </div>
        </div>
      </aside>
